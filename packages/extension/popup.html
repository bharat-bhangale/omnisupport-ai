<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniSupport AI</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: linear-gradient(135deg, #0d9488, #0891b2);
      color: white;
    }
    .header-icon {
      font-size: 24px;
    }
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header-text p {
      font-size: 12px;
      opacity: 0.9;
    }
    .content {
      padding: 16px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }
    .status-text {
      font-size: 14px;
      color: #166534;
    }
    .status.disconnected {
      background: #fef2f2;
    }
    .status.disconnected .status-dot {
      background: #ef4444;
    }
    .status.disconnected .status-text {
      color: #991b1b;
    }
    .info {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .info-label {
      color: #9ca3af;
    }
    .info-value {
      color: #1f2937;
      font-weight: 500;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: #0d9488;
      color: white;
    }
    .btn-primary:hover {
      background: #0f766e;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .btn-secondary:hover {
      background: #e5e7eb;
    }
    .btn-danger {
      background: #fef2f2;
      color: #991b1b;
    }
    .btn-danger:hover {
      background: #fee2e2;
    }
    .login-prompt {
      text-align: center;
      padding: 24px 16px;
    }
    .login-prompt p {
      color: #6b7280;
      margin-bottom: 16px;
    }
    .footer {
      padding: 12px 16px;
      background: #f9fafb;
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">✨</span>
    <div class="header-text">
      <h1>OmniSupport AI</h1>
      <p>Support Assistant Extension</p>
    </div>
  </div>
  
  <div id="app">
    <div class="content">
      <div class="status" id="status">
        <div class="status-dot"></div>
        <span class="status-text">Checking connection...</span>
      </div>
      
      <div id="user-info" class="info" style="display: none;">
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="user-email">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Company</span>
          <span class="info-value" id="user-company">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Role</span>
          <span class="info-value" id="user-role">—</span>
        </div>
      </div>
      
      <div id="login-prompt" class="login-prompt" style="display: none;">
        <p>Sign in to access OmniSupport AI features on Zendesk and Freshdesk.</p>
        <button class="btn btn-primary" id="login-btn">Sign In</button>
      </div>
      
      <div id="actions" class="actions" style="display: none;">
        <button class="btn btn-secondary" id="dashboard-btn">Open Dashboard</button>
        <button class="btn btn-danger" id="logout-btn">Sign Out</button>
      </div>
    </div>
  </div>
  
  <div class="footer">
    OmniSupport AI v1.0.0
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const userInfoEl = document.getElementById('user-info');
    const loginPromptEl = document.getElementById('login-prompt');
    const actionsEl = document.getElementById('actions');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const dashboardBtn = document.getElementById('dashboard-btn');

    async function checkAuth() {
      try {
        const response = await chrome.runtime.sendMessage({ type: 'GET_AUTH_STATE' });
        if (response.isAuthenticated && response.user) {
          showAuthenticated(response.user);
        } else {
          showUnauthenticated();
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        showError();
      }
    }

    function showAuthenticated(user) {
      statusEl.className = 'status';
      statusEl.querySelector('.status-text').textContent = 'Connected';
      
      document.getElementById('user-email').textContent = user.email || '—';
      document.getElementById('user-company').textContent = user.companyId || '—';
      document.getElementById('user-role').textContent = user.role || '—';
      
      userInfoEl.style.display = 'block';
      actionsEl.style.display = 'flex';
      loginPromptEl.style.display = 'none';
    }

    function showUnauthenticated() {
      statusEl.className = 'status disconnected';
      statusEl.querySelector('.status-text').textContent = 'Not signed in';
      
      userInfoEl.style.display = 'none';
      actionsEl.style.display = 'none';
      loginPromptEl.style.display = 'block';
    }

    function showError() {
      statusEl.className = 'status disconnected';
      statusEl.querySelector('.status-text').textContent = 'Connection error';
    }

    loginBtn.addEventListener('click', async () => {
      loginBtn.textContent = 'Signing in...';
      loginBtn.disabled = true;
      try {
        await chrome.runtime.sendMessage({ type: 'LOGIN' });
        checkAuth();
      } catch (error) {
        alert('Sign in failed: ' + error.message);
      } finally {
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await chrome.runtime.sendMessage({ type: 'LOGOUT' });
      showUnauthenticated();
    });

    dashboardBtn.addEventListener('click', () => {
      chrome.tabs.create({ url: 'https://app.omnisupport.ai' });
    });

    // Check auth on load
    checkAuth();
  </script>
</body>
</html>
